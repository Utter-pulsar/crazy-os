name: Build installers

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: installers-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            runner: windows-latest
            command: dist:win
            artifact_name: crazy-os-windows-x64
            artifact_path: |
              dist/*.exe
              dist/latest*.yml
              dist/*.blockmap
          - label: macOS x64 + arm64
            runner: macos-latest
            command: dist:mac
            artifact_name: crazy-os-macos
            artifact_path: |
              dist/*.dmg
              dist/*.zip
              dist/latest*.yml
              dist/*.blockmap
          - label: Linux x64
            runner: ubuntu-latest
            command: dist:linux
            artifact_name: crazy-os-linux-x64
            artifact_path: |
              dist/*.AppImage
              dist/*.deb
              dist/latest*.yml
              dist/*.blockmap

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./package.json').version")"
          if [ "$tag_version" != "$package_version" ]; then
            echo "::error::Tag v$tag_version does not match package.json version $package_version"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type-check
        run: npm run typecheck

      - name: Build installer
        run: npm run ${{ matrix.command }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
